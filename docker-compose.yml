version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=numok
      - DB_USER=numok_user
      - DB_PASS=numok_password
      - APP_URL=http://localhost:8080
      - APP_DEBUG=true
    volumes:
      - ./public/tracking:/var/www/html/public/tracking
      - ./public/assets/uploads:/var/www/html/public/assets/uploads
    networks:
      - numok_network

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=numok
      - MYSQL_USER=numok_user
      - MYSQL_PASSWORD=numok_password
      - MYSQL_ROOT_PASSWORD=root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/deploy.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./docker/init-admin.sql:/docker-entrypoint-initdb.d/02-admin.sql
    networks:
      - numok_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - web
    networks:
      - numok_network

volumes:
  mysql_data:

networks:
  numok_network:
    driver: bridge